<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>竞技之巅 - 双人对战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
body{background:#0a0a1a;color:#e0e0e0;font-family:'Segoe UI',sans-serif;overflow:hidden;width:100vw;height:100vh}
canvas{display:block;width:100vw;height:100vh}

#ui-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#ui-layer *{pointer-events:auto}

.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}

#menu-screen{background:linear-gradient(135deg,#0a0a2e,#1a0a3e,#0a1a3e)}
#menu-screen h1{font-size:4rem;background:linear-gradient(135deg,#ff6ec4,#7873f5,#4aeadc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem;animation:float 3s ease-in-out infinite}
#menu-screen .subtitle{color:#888;font-size:1.1rem;margin-bottom:3rem;letter-spacing:4px}
.menu-btn{display:block;margin:.6rem;padding:1rem 3.5rem;font-size:1.2rem;border:2px solid #7873f5;background:rgba(120,115,245,.1);color:#e0e0e0;border-radius:14px;cursor:pointer;transition:all .3s;min-width:280px;letter-spacing:2px}
.menu-btn:hover{background:rgba(120,115,245,.4);box-shadow:0 0 30px rgba(120,115,245,.4);transform:scale(1.05)}

#select-screen{background:linear-gradient(135deg,#0a0a2e,#1a0a3e)}
.select-title{font-size:2rem;margin-bottom:1.5rem;color:#fff}
.select-area{display:flex;gap:60px;margin-bottom:2rem}
.player-select{text-align:center}
.player-select h2{font-size:1.3rem;margin-bottom:1rem;background:linear-gradient(90deg,#ff6ec4,#7873f5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.char-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.char-card{width:100px;height:120px;border:2px solid rgba(255,255,255,.15);border-radius:12px;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.03)}
.char-card:hover{border-color:#7873f5;background:rgba(120,115,245,.15)}
.char-card.selected{border-color:#4aeadc;background:rgba(74,234,220,.15);box-shadow:0 0 20px rgba(74,234,220,.3)}
.char-card .char-icon{font-size:2.5rem;margin-bottom:4px}
.char-card .char-name{font-size:.75rem;color:#ccc}
.char-info{width:310px;min-height:140px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px;text-align:left;font-size:.8rem;line-height:1.7}
.char-info .ci-name{font-size:1.1rem;font-weight:bold;margin-bottom:6px}
.char-info .ci-skill{color:#aaa}
.char-info .ci-skill b{color:#4aeadc}
.char-info .ci-ult b{color:#ff6ec4}

#map-screen{background:linear-gradient(135deg,#0a0a2e,#0a1a3e)}
.map-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:2rem}
.map-card{width:200px;height:140px;border:2px solid rgba(255,255,255,.15);border-radius:14px;cursor:pointer;transition:all .3s;overflow:hidden;position:relative}
.map-card:hover{border-color:#7873f5;transform:scale(1.05)}
.map-card.selected{border-color:#4aeadc;box-shadow:0 0 25px rgba(74,234,220,.4)}
.map-card canvas{width:100%;height:100%}
.map-card .map-name{position:absolute;bottom:0;left:0;right:0;padding:6px;text-align:center;background:rgba(0,0,0,.6);font-size:.85rem;letter-spacing:2px}

.start-btn{padding:1rem 4rem;font-size:1.3rem;border:2px solid #4aeadc;background:rgba(74,234,220,.1);color:#e0e0e0;border-radius:14px;cursor:pointer;transition:all .3s;letter-spacing:3px}
.start-btn:hover{background:rgba(74,234,220,.3);box-shadow:0 0 30px rgba(74,234,220,.4)}
.start-btn:disabled{opacity:.3;cursor:not-allowed}

.keys-hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:40px;font-size:.75rem;color:#666}
.keys-hint div{text-align:center;line-height:1.8}
.keys-hint span.k{background:rgba(255,255,255,.1);padding:1px 7px;border-radius:4px;font-family:monospace;margin:0 2px}

#hud{position:absolute;top:0;left:0;width:100%;pointer-events:none;display:none;padding:8px 20px}
.hud-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.hud-row{display:flex;justify-content:space-between;align-items:center;gap:20px}
.hud-block{display:flex;align-items:center;gap:8px}
.hud-name{font-size:1.2rem;font-weight:bold}
.hud-p1-name{color:#4aeadc}
.hud-p2-name{color:#ff6ec4;text-align:right}
.hp-bar-bg{width:420px;height:28px;background:rgba(0,0,0,.6);border-radius:14px;overflow:hidden;border:2px solid rgba(255,255,255,.25);position:relative}
.hp-bar{height:100%;border-radius:14px;transition:width .3s}
.hp-bar-p1{background:linear-gradient(90deg,#4aeadc,#7873f5)}
.hp-bar-p2{background:linear-gradient(270deg,#ff6ec4,#f5a623)}
.skill-icons{display:flex;gap:6px}
.skill-icon{width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:1.1rem;position:relative}
.skill-icon .cd-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);border-radius:0 0 7px 7px;text-align:center;font-size:.6rem;color:#ff6ec4}
.ult-bar-bg{width:100px;height:6px;background:rgba(0,0,0,.4);border-radius:3px;margin-top:2px}
.ult-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#f5a623,#ff6ec4);transition:width .2s}

#result-screen{background:rgba(0,0,0,.75)}
#result-screen h1{font-size:3rem;margin-bottom:1rem}
#result-screen .winner-text{font-size:1.5rem;margin-bottom:2rem;color:#4aeadc}
#online-screen{background:linear-gradient(135deg,#0a0a2e,#1a0a3e)}
#login-screen{background:linear-gradient(135deg,#0a0a2e,#1a0a3e,#0a1a3e)}
#login-screen input{width:220px;padding:10px 14px;font-size:1rem;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.2);border-radius:10px;color:#e0e0e0;font-family:'Segoe UI',sans-serif;margin-bottom:.8rem;display:block;margin-left:auto;margin-right:auto}
#login-screen input::placeholder{color:#555}
.user-bar{position:absolute;top:12px;right:20px;display:flex;align-items:center;gap:12px;font-size:.85rem;z-index:5}
.user-bar .username{color:#4aeadc;font-weight:bold}
.user-bar .wins{color:#f5c542}
.user-bar button{padding:4px 12px;font-size:.75rem;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:#aaa;border-radius:6px;cursor:pointer}
.user-bar button:hover{background:rgba(255,255,255,.15);color:#fff}
#pw-screen{background:linear-gradient(135deg,#0a0a2e,#1a0a3e)}
#pw-screen input{width:220px;padding:10px 14px;font-size:1rem;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.2);border-radius:10px;color:#e0e0e0;margin-bottom:.8rem;display:block;margin-left:auto;margin-right:auto}
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>
<div id="ui-layer">
  <div id="user-bar" class="user-bar" style="display:none">
    <span class="username" id="user-display"></span>
    <span class="wins" id="wins-display"></span>
    <button onclick="showPwScreen()">改密码</button>
    <button onclick="logout()">退出登录</button>
  </div>
  <div id="login-screen" class="screen active">
    <h1 style="font-size:3rem;background:linear-gradient(135deg,#ff6ec4,#7873f5,#4aeadc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2rem">竞技之巅</h1>
    <div style="background:rgba(0,0,0,.6);padding:30px 40px;border-radius:16px;border:1px solid rgba(255,255,255,.1);text-align:center">
      <h2 style="margin-bottom:1.5rem;font-size:1.3rem">登录</h2>
      <input id="login-user" type="text" placeholder="用户名" autofocus>
      <input id="login-pass" type="password" placeholder="密码">
      <button class="menu-btn" style="margin-top:.5rem" onclick="doLogin()">登录</button>
      <div id="login-msg" style="color:#ff6ec4;margin-top:.8rem;font-size:.85rem"></div>
    </div>
  </div>
  <div id="menu-screen" class="screen">
    <h1>竞技之巅</h1>
    <div class="subtitle">ARENA CLASH</div>
    <button class="menu-btn" onclick="goToOnline()">在线联机</button>
    <button class="menu-btn" onclick="showHelp()">操作说明</button>
  </div>
  <div id="pw-screen" class="screen">
    <div style="background:rgba(0,0,0,.6);padding:30px 40px;border-radius:16px;border:1px solid rgba(255,255,255,.1);text-align:center">
      <h2 style="margin-bottom:1.5rem;font-size:1.3rem">修改密码</h2>
      <input id="pw-old" type="password" placeholder="旧密码">
      <input id="pw-new" type="password" placeholder="新密码">
      <input id="pw-new2" type="password" placeholder="确认新密码">
      <button class="menu-btn" onclick="doChangePw()">确认修改</button>
      <div id="pw-msg" style="color:#ff6ec4;margin-top:.8rem;font-size:.85rem"></div>
      <button class="menu-btn" style="margin-top:.5rem" onclick="showScreen('menu-screen')">返回</button>
    </div>
  </div>
  <div id="select-screen" class="screen"></div>
  <div id="map-screen" class="screen"></div>
  <div id="hud"></div>
  <div id="result-screen" class="screen">
    <h1 id="result-title"></h1>
    <div class="winner-text" id="result-detail"></div>
    <button class="menu-btn" onclick="rematch()">再来一局</button>
    <button class="menu-btn" onclick="leaveOnline()">返回菜单</button>
  </div>
  <div id="help-screen" class="screen">
    <div style="background:rgba(0,0,0,.85);padding:40px 60px;border-radius:20px;max-width:700px;border:1px solid rgba(255,255,255,.1)">
      <h2 style="margin-bottom:1.5rem;text-align:center">操作说明</h2>
      <div style="font-size:.9rem;line-height:2.2;text-align:center">
        <div>移动：<span class="k">A</span> <span class="k">D</span></div>
        <div>跳跃：<span class="k">W</span></div>
        <div>技能1：<span class="k">J</span></div>
        <div>技能2：<span class="k">K</span></div>
        <div>绝招：<span class="k">L</span></div>
      </div>
      <div style="text-align:center;margin-top:2rem"><button class="menu-btn" onclick="hideHelp()">返回</button></div>
    </div>
  </div>
  <div id="online-screen" class="screen">
    <div style="background:rgba(0,0,0,.85);padding:40px 60px;border-radius:20px;max-width:500px;border:1px solid rgba(255,255,255,.1);text-align:center">
      <h2 style="margin-bottom:1rem">在线联机</h2>
      <p style="color:#888;font-size:.85rem;margin-bottom:1.5rem">点击加入房间，等待对手连接</p>
      <button class="menu-btn" onclick="joinOnline()">加入房间</button>
      <div id="online-status" style="color:#4aeadc;margin-top:1rem;font-size:.9rem"></div>
      <button class="menu-btn" style="margin-top:.5rem" onclick="leaveOnline()">返回</button>
    </div>
  </div>
</div>

<script>
const W=1200,H=700,MAX_HP=100,ULT_CHARGE=60;
const canvas=document.getElementById('game-canvas');
const ctx=canvas.getContext('2d');
canvas.width=W;canvas.height=H;

const CHAR_IDS=['warrior','mage','ninja','archer','tank','spirit'];
const CHARACTERS=[
  {id:'warrior',name:'剑士',icon:'⚔️',color:'#4aeadc',desc:'近战高手，攻守兼备',
    skill1:{name:'横斩',icon:'🗡️',cd:1.5,desc:'向前挥砍，伤害15'},
    skill2:{name:'剑盾冲锋',icon:'🛡️',cd:4,desc:'护盾冲撞+击飞，伤害12'},
    ult:{name:'剑气风暴',icon:'⚡',desc:'三连巨型斩击，共42伤害'}},
  {id:'mage',name:'法师',icon:'🔮',color:'#a855f7',desc:'远程控制，技能多变',
    skill1:{name:'火球',icon:'🔥',cd:2,desc:'发射火球，伤害18'},
    skill2:{name:'传送',icon:'🌀',cd:5,desc:'向面朝方向瞬移'},
    ult:{name:'流星火雨',icon:'☄️',desc:'天降5颗流星，共35伤害'}},
  {id:'ninja',name:'忍者',icon:'🌀',color:'#22c55e',desc:'高速突进，背刺暴击',
    skill1:{name:'手里剑',icon:'⭐',cd:1.5,desc:'三连投掷，每颗5伤害'},
    skill2:{name:'影步',icon:'💨',cd:3,desc:'瞬移到对手身后+暴击'},
    ult:{name:'千影乱舞',icon:'🌪️',desc:'高速连击，共45伤害'}},
  {id:'archer',name:'弓手',icon:'🏹',color:'#f59e0b',desc:'远程狙击，区域控制',
    skill1:{name:'蓄力箭',icon:'🏹',cd:2,desc:'高速穿透箭，伤害16'},
    skill2:{name:'后跳射',icon:'🔙',cd:3,desc:'后跳+散射箭，共24伤害'},
    ult:{name:'万箭齐发',icon:'🌟',desc:'扇形箭雨，共40伤害'}},
  {id:'tank',name:'铁壁',icon:'🛡️',color:'#3b82f6',desc:'血厚防高，近身控制',
    skill1:{name:'重拳',icon:'👊',cd:2,desc:'重击+击退，伤害18'},
    skill2:{name:'大地钉',icon:'🪨',cd:5,desc:'震波眩晕+10伤害'},
    ult:{name:'大地震击',icon:'💥',desc:'全屏地震，伤害35+击飞'}},
  {id:'spirit',name:'灵狐',icon:'🦊',color:'#ec4899',desc:'灵活多变，吸血续航',
    skill1:{name:'魅惑弹',icon:'💜',cd:1.5,desc:'灵弹+减速，伤害10'},
    skill2:{name:'生命汲取',icon:'💚',cd:5,desc:'吸血15HP'},
    ult:{name:'九尾幻象',icon:'🦊',desc:'3分身围攻，共42伤害'}}
];

const MAPS=[
  {id:'dojo',name:'天空道场',bg:['#1a1040','#2a1860'],
    platforms:[{x:100,y:550,w:1000,h:30},{x:250,y:400,w:250,h:18},{x:700,y:400,w:250,h:18},{x:450,y:270,w:300,h:18}],
    decos:[{type:'circle',x:600,y:100,r:60,color:'rgba(255,200,100,.15)'}]},
  {id:'volcano',name:'熔岩地狱',bg:['#2a0a00','#1a0500'],
    platforms:[{x:50,y:560,w:400,h:30},{x:750,y:560,w:400,h:30},{x:350,y:420,w:300,h:18},{x:200,y:280,w:200,h:18},{x:800,y:280,w:200,h:18}],
    decos:[{type:'lava',y:650}]},
  {id:'sky',name:'云端之城',bg:['#0a1a3e','#1a3060'],
    platforms:[{x:100,y:500,w:300,h:18},{x:500,y:400,w:200,h:18},{x:800,y:500,w:300,h:18},{x:300,y:280,w:200,h:18},{x:700,y:280,w:200,h:18},{x:480,y:160,w:240,h:18}],
    decos:[{type:'cloud',x:150,y:200},{type:'cloud',x:900,y:150},{type:'cloud',x:550,y:80}]},
  {id:'arena',name:'角斗场',bg:['#1a1a0a','#2a2a10'],
    platforms:[{x:50,y:580,w:1100,h:30},{x:100,y:430,w:180,h:18},{x:920,y:430,w:180,h:18},{x:400,y:320,w:400,h:18}],
    decos:[{type:'pillar',x:80,y:430},{type:'pillar',x:1080,y:430}]}
];

// ===== 游戏状态（全部由服务器同步） =====
let gameState='menu',localPlayerId=0,selectedMap=null;
let p1={x:0,y:0,hp:100,vx:0,vy:0,facing:1,cd1:0,cd2:0,ultCharge:0,frozen:0,shield:0,armor:0,invincible:0,onGround:false,charIdx:0,hitStun:0,slowTimer:0,ultActive:false};
let p2={x:0,y:0,hp:100,vx:0,vy:0,facing:-1,cd1:0,cd2:0,ultCharge:0,frozen:0,shield:0,armor:0,invincible:0,onGround:false,charIdx:1,hitStun:0,slowTimer:0,ultActive:false};
let projectiles=[],effects=[],items=[],traps=[],particles=[];
let screenShake=0,sel1=0,sel2=1;
let keysDown={};
let ws=null,currentUser='',currentWins=0,opponentName='';
let remoteReady=false,localReady=false;

// ===== 绘制函数（纯渲染，无逻辑） =====
function drawMap(){
  let map=MAPS[selectedMap];
  let g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,map.bg[0]);g.addColorStop(1,map.bg[1]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  for(let d of map.decos){
    if(d.type==='circle'){ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fillStyle=d.color;ctx.fill();}
    if(d.type==='lava'){let lg=ctx.createLinearGradient(0,d.y-30,0,H);lg.addColorStop(0,'rgba(255,80,0,.6)');lg.addColorStop(1,'rgba(200,30,0,.8)');ctx.fillStyle=lg;ctx.fillRect(0,d.y-20,W,H-d.y+20);}
    if(d.type==='cloud'){ctx.fillStyle='rgba(255,255,255,.08)';ctx.beginPath();ctx.ellipse(d.x,d.y,80,30,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(d.x+40,d.y+10,50,20,0,0,Math.PI*2);ctx.fill();}
    if(d.type==='pillar'){ctx.fillStyle='rgba(200,180,100,.15)';ctx.fillRect(d.x-10,d.y-80,20,80);}
  }
  for(let pl of map.platforms){
    let pg=ctx.createLinearGradient(pl.x,pl.y,pl.x,pl.y+pl.h);
    pg.addColorStop(0,'rgba(255,255,255,.2)');pg.addColorStop(1,'rgba(255,255,255,.05)');
    ctx.fillStyle=pg;ctx.beginPath();ctx.roundRect(pl.x,pl.y,pl.w,pl.h,4);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(pl.x,pl.y,pl.w,pl.h,4);ctx.stroke();
  }
}

function drawPlayer(p){
  ctx.save();
  if(p.invincible>0&&Math.floor(p.invincible/3)%2)ctx.globalAlpha=.4;
  if(p.frozen>0)ctx.filter='hue-rotate(180deg) brightness(1.5)';
  let bx=p.x,by=p.y,f=p.facing;
  let cid=CHAR_IDS[p.charIdx];
  let color=CHARACTERS[p.charIdx].color;
  let tt=performance.now()*.003,breathe=Math.sin(tt*2)*1.5;
  p.color=color;p.char={id:cid};p.id=p===p1?1:2;p.w=36;
  ctx.shadowColor=color;ctx.shadowBlur=10;

function drawEffects(){
  for(let e of effects){
    ctx.save();
    if(e.type==='slash'){ctx.globalAlpha=e.timer/12;ctx.fillStyle=e.color;ctx.shadowColor=e.color;ctx.shadowBlur=15;ctx.fillRect(e.x-e.w/2,e.y-e.h/2,e.w,e.h);ctx.shadowBlur=0;}
    if(e.type==='meteor'){ctx.fillStyle=e.color;ctx.shadowColor=e.color;ctx.shadowBlur=20;ctx.beginPath();ctx.arc(e.x,e.y,15,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
    if(e.type==='clone'){ctx.globalAlpha=.5+.5*(e.timer/40);ctx.fillStyle=e.color;ctx.beginPath();ctx.roundRect(e.x-18,e.y-28,32,56,6);ctx.fill();}
    if(e.type==='groundwave'){ctx.globalAlpha=e.timer/20;ctx.fillStyle=e.color;ctx.shadowColor=e.color;ctx.shadowBlur=10;let sp=(20-e.timer)/20*(e.w||200);ctx.fillRect(e.x-sp/2,e.y-4,sp,8);ctx.shadowBlur=0;}
    if(e.type==='drain'){ctx.globalAlpha=e.timer/20;ctx.strokeStyle=e.color;ctx.lineWidth=3;ctx.shadowColor=e.color;ctx.shadowBlur=8;ctx.beginPath();ctx.moveTo(e.x1,e.y1);ctx.lineTo(e.x2,e.y2);ctx.stroke();ctx.shadowBlur=0;ctx.lineWidth=1;}
    ctx.restore();
  }
  for(let pr of projectiles){ctx.save();ctx.shadowColor=pr.color;ctx.shadowBlur=12;ctx.fillStyle=pr.color;ctx.beginPath();ctx.arc(pr.x,pr.y,pr.w/2,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.restore();}
  for(let t of traps){ctx.save();ctx.globalAlpha=.6+.3*Math.sin(t.timer*.1);ctx.fillStyle=t.color;ctx.fillRect(t.x-15,t.y-5,30,10);ctx.restore();}
  for(let p of particles){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);ctx.shadowBlur=0;ctx.restore();}
}

function drawItems(){
  for(let it of items){
    ctx.save();let bob=Math.sin(it.bobTimer*.05)*5;
    ctx.globalAlpha=it.timer<120?it.timer/120:1;
    ctx.shadowColor=it.color;ctx.shadowBlur=15;ctx.fillStyle=it.color;
    ctx.beginPath();ctx.arc(it.x,it.y+bob,12,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(it.icon,it.x,it.y+bob);ctx.restore();
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=p.decay;if(p.life<=0)particles.splice(i,1);}
}

function updateHUD(){
  let ch1=CHARACTERS[p1.charIdx],ch2=CHARACTERS[p2.charIdx];
  let hud=document.getElementById('hud');hud.style.display='block';
  hud.innerHTML=`
    <div class="hud-top">
      <div class="hud-name hud-p1-name">${ch1.icon} ${ch1.name}</div>
      <div class="hud-name hud-p2-name">${ch2.name} ${ch2.icon}</div>
    </div>
    <div class="hud-row">
      <div class="hud-block">
        <div class="hp-bar-bg"><div class="hp-bar hp-bar-p1" style="width:${p1.hp}%"></div><span style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:.95rem;color:#fff;font-weight:bold;text-shadow:0 1px 3px #000">${p1.hp}/${MAX_HP}</span></div>
        <div class="skill-icons">
          <div class="skill-icon">${ch1.skill1.icon}${p1.cd1>0?`<div class="cd-overlay">${Math.ceil(p1.cd1)}s</div>`:''}</div>
          <div class="skill-icon">${ch1.skill2.icon}${p1.cd2>0?`<div class="cd-overlay">${Math.ceil(p1.cd2)}s</div>`:''}</div>
          <div class="skill-icon" style="border-color:${p1.ultCharge>=ULT_CHARGE?'#ff6ec4':'rgba(255,255,255,.15)'}">${ch1.ult.icon}</div>
        </div>
        <div class="ult-bar-bg"><div class="ult-bar" style="width:${p1.ultCharge/ULT_CHARGE*100}%"></div></div>
      </div>
      <div class="hud-block">
        <div class="ult-bar-bg"><div class="ult-bar" style="width:${p2.ultCharge/ULT_CHARGE*100}%"></div></div>
        <div class="skill-icons">
          <div class="skill-icon" style="border-color:${p2.ultCharge>=ULT_CHARGE?'#ff6ec4':'rgba(255,255,255,.15)'}">${ch2.ult.icon}</div>
          <div class="skill-icon">${ch2.skill2.icon}${p2.cd2>0?`<div class="cd-overlay">${Math.ceil(p2.cd2)}s</div>`:''}</div>
          <div class="skill-icon">${ch2.skill1.icon}${p2.cd1>0?`<div class="cd-overlay">${Math.ceil(p2.cd1)}s</div>`:''}</div>
        </div>
        <div class="hp-bar-bg"><div class="hp-bar hp-bar-p2" style="width:${p2.hp}%"></div><span style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:.95rem;color:#fff;font-weight:bold;text-shadow:0 1px 3px #000">${p2.hp}/${MAX_HP}</span></div>
      </div>
    </div>`;
}

// ===== 游戏主循环（纯渲染+发送输入） =====
function gameLoop(t){
  if(gameState!=='playing')return;
  sendNet({type:'input',l:!!keysDown['a'],r:!!keysDown['d']});
  updateParticles();
  if(screenShake>0)screenShake--;
  ctx.save();
  if(screenShake>0)ctx.translate((Math.random()-.5)*screenShake*2,(Math.random()-.5)*screenShake*2);
  drawMap();drawItems();drawPlayer(p1);drawPlayer(p2);drawEffects();
  ctx.restore();
  updateHUD();
  requestAnimationFrame(gameLoop);
}

// ===== UI 函数 =====
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));if(id)document.getElementById(id).classList.add('active');}
function showHelp(){showScreen('help-screen');}
function hideHelp(){showScreen('menu-screen');}
function goToOnline(){showScreen('online-screen');document.getElementById('online-status').textContent='';}
function leaveOnline(){gameState='menu';showScreen('menu-screen');document.getElementById('hud').style.display='none';ctx.clearRect(0,0,W,H);}
function goToSelect(){gameState='select';localReady=false;remoteReady=false;buildSelectScreen();showScreen('select-screen');}

function buildSelectScreen(){
  let ss=document.getElementById('select-screen');
  let myPid=localPlayerId;
  let mySel=myPid===1?sel1:sel2,otherSel=myPid===1?sel2:sel1;
  let otherCh=CHARACTERS[otherSel],opLabel=opponentName||'对手';
  let myKeys='移动 <span class="k">A</span><span class="k">D</span> 跳跃 <span class="k">W</span><br>技能1 <span class="k">J</span> 技能2 <span class="k">K</span> 绝招 <span class="k">L</span>';
  ss.innerHTML=`<div class="select-title">选择角色 — 你是玩家${myPid}</div>
    <div class="select-area">
      <div class="player-select"><h2 style="color:${myPid===1?'#4aeadc':'#ff6ec4'}">你的角色</h2><div class="char-grid" id="grid1"></div><div class="char-info" id="info1"></div></div>
      <div class="player-select"><h2 style="color:${myPid===1?'#ff6ec4':'#4aeadc'}">${opLabel}</h2>
        <div class="char-info" id="info2" style="display:flex;align-items:center;justify-content:center;min-height:200px">
          ${remoteReady?`<div><div style="font-size:3rem;margin-bottom:8px">${otherCh.icon}</div><div style="color:${otherCh.color};font-size:1.1rem">${otherCh.name}</div><div style="color:#4aeadc;margin-top:8px">✓ 已确认</div></div>`
          :`<div style="color:#888">等待${opLabel}选择...</div>`}
        </div>
      </div>
    </div>
    <button class="start-btn" id="confirm-btn" onclick="confirmSelect()">${localReady?'✓ 已确认，等待对手...':'确认选择'}</button>
    <div class="keys-hint" style="position:relative;margin-top:1.5rem"><div>${myKeys}</div></div>`;
  let grid=document.getElementById('grid1');
  CHARACTERS.forEach((ch,i)=>{
    let card=document.createElement('div');card.className='char-card';
    if(i===mySel)card.classList.add('selected');
    card.innerHTML=`<div class="char-icon">${ch.icon}</div><div class="char-name">${ch.name}</div>`;
    card.onclick=()=>{if(localReady)return;if(myPid===1)sel1=i;else sel2=i;sendNet({type:'select',charIdx:i});buildSelectScreen();};
    grid.appendChild(card);
  });
  let ch=CHARACTERS[mySel];
  document.getElementById('info1').innerHTML=`<div class="ci-name" style="color:${ch.color}">${ch.icon} ${ch.name}</div>
    <div style="color:#aaa;margin-bottom:6px">${ch.desc}</div>
    <div class="ci-skill"><b>技能1:</b> ${ch.skill1.name} - ${ch.skill1.desc} (CD:${ch.skill1.cd}s)</div>
    <div class="ci-skill"><b>技能2:</b> ${ch.skill2.name} - ${ch.skill2.desc} (CD:${ch.skill2.cd}s)</div>
    <div class="ci-skill"><b style="color:#ff6ec4">绝招:</b> ${ch.ult.name} - ${ch.ult.desc}</div>`;
  if(localReady)document.getElementById('confirm-btn').disabled=true;
}
function confirmSelect(){localReady=true;sendNet({type:'confirmed'});if(remoteReady)goToMapSelect();else buildSelectScreen();}
function rematch(){sendNet({type:'rematch'});goToSelect();}

function goToMapSelect(){gameState='mapselect';buildMapScreen();showScreen('map-screen');}
function buildMapScreen(){
  let ms=document.getElementById('map-screen');
  let kh='<div>移动 <span class="k">A</span><span class="k">D</span> 跳跃 <span class="k">W</span><br>技能1 <span class="k">J</span> 技能2 <span class="k">K</span> 绝招 <span class="k">L</span></div>';
  ms.innerHTML='<div class="select-title">选择地图</div><div class="map-grid" id="mapgrid"></div><button class="start-btn" id="fight-btn" disabled onclick="startFight()">开始战斗！</button><div class="keys-hint" style="position:relative;margin-top:1.5rem">'+kh+'</div>';
  let mg=document.getElementById('mapgrid');
  MAPS.forEach((map,i)=>{
    let card=document.createElement('div');card.className='map-card';
    if(selectedMap===i)card.classList.add('selected');
    let cv=document.createElement('canvas');cv.width=200;cv.height=140;
    let c=cv.getContext('2d');let g=c.createLinearGradient(0,0,0,140);g.addColorStop(0,map.bg[0]);g.addColorStop(1,map.bg[1]);c.fillStyle=g;c.fillRect(0,0,200,140);
    let sx=200/W,sy=140/H;for(let pl of map.platforms){c.fillStyle='rgba(255,255,255,.25)';c.fillRect(pl.x*sx,pl.y*sy,pl.w*sx,Math.max(pl.h*sy,3));}
    let label=document.createElement('div');label.className='map-name';label.textContent=map.name;
    card.append(cv,label);card.onclick=()=>{selectedMap=i;sendNet({type:'map',mapIdx:i});buildMapScreen();};mg.appendChild(card);
  });
  if(selectedMap!==null)document.getElementById('fight-btn').disabled=false;
}
function startFight(){sendNet({type:'start'});}
function beginPlaying(){
  gameState='playing';
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('hud').style.display='block';
  particles=[];screenShake=0;
  requestAnimationFrame(gameLoop);
}

// ===== 键盘（只发送，不执行逻辑） =====
document.addEventListener('keydown',e=>{
  let k=e.key.toLowerCase();
  if(keysDown[k])return;keysDown[k]=true;
  if(gameState!=='playing')return;
  if(k==='w')sendNet({type:'jump'});
  if(k==='j')sendNet({type:'skill',sk:'s1'});
  if(k==='k')sendNet({type:'skill',sk:'s2'});
  if(k==='l')sendNet({type:'skill',sk:'ult'});
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k))e.preventDefault();
});
document.addEventListener('keyup',e=>{keysDown[e.key.toLowerCase()]=false;});
window.addEventListener('blur',()=>{keysDown={};});

// ===== 网络（WebSocket） =====
function connectWS(){
  let addr=location.hostname||'localhost';
  ws=new WebSocket('ws://'+addr+':9000');
  ws.onopen=()=>{let s=localStorage.getItem('arena-auth');if(s){let d=JSON.parse(s);ws.send(JSON.stringify({type:'token-login',user:d.user,token:d.token}));}};
  ws.onmessage=e=>{
    let msg=JSON.parse(e.data);
    if(msg.type==='login-ok'){currentUser=msg.user;currentWins=msg.wins;localStorage.setItem('arena-auth',JSON.stringify({user:msg.user,token:msg.token}));document.getElementById('user-display').textContent=msg.user;document.getElementById('wins-display').textContent='🏆 '+msg.wins+'胜';document.getElementById('user-bar').style.display='flex';showScreen('menu-screen');}
    if(msg.type==='login-fail'){document.getElementById('login-msg').textContent=msg.msg;localStorage.removeItem('arena-auth');showScreen('login-screen');document.getElementById('user-bar').style.display='none';}
    if(msg.type==='pw-ok'){document.getElementById('pw-msg').style.color='#4aeadc';document.getElementById('pw-msg').textContent='密码修改成功！';localStorage.setItem('arena-auth',JSON.stringify({user:currentUser,token:msg.token}));setTimeout(()=>showScreen('menu-screen'),1000);}
    if(msg.type==='pw-fail'){document.getElementById('pw-msg').style.color='#ff6ec4';document.getElementById('pw-msg').textContent=msg.msg;}
    if(msg.type==='role'){localPlayerId=msg.pid;document.getElementById('online-status').textContent='你是玩家'+msg.pid+'，'+msg.msg;if(msg.pid===2){setTimeout(()=>goToSelect(),800);}}
    if(msg.type==='peer-joined'){opponentName=msg.name||'对手';document.getElementById('online-status').textContent=opponentName+' 已加入！';setTimeout(()=>goToSelect(),800);}
    if(msg.type==='peer-info'){opponentName=msg.name||'对手';}
    if(msg.type==='peer-left'){if(gameState==='playing'){gameState='result';showScreen('result-screen');document.getElementById('result-title').textContent='对手断开连接';document.getElementById('result-detail').textContent='';document.getElementById('hud').style.display='none';}}
    if(msg.type==='error'){let el=document.getElementById('online-status');if(el)el.textContent=msg.msg;}
    if(msg.type==='select'){if(localPlayerId===1)sel2=msg.charIdx;else sel1=msg.charIdx;buildSelectScreen();}
    if(msg.type==='confirmed'){remoteReady=true;if(localReady)goToMapSelect();else buildSelectScreen();}
    if(msg.type==='map'){selectedMap=msg.mapIdx;buildMapScreen();}
    if(msg.type==='start'){beginPlaying();}
    if(msg.type==='rematch'){goToSelect();}
    if(msg.type==='state'){
      let s1=msg.p1,s2=msg.p2;
      p1.x=s1.x;p1.y=s1.y;p1.hp=s1.hp;p1.vx=s1.vx;p1.vy=s1.vy;p1.facing=s1.f;p1.cd1=s1.c1;p1.cd2=s1.c2;p1.ultCharge=s1.uc;p1.frozen=s1.fr;p1.shield=s1.sh;p1.armor=s1.ar;p1.invincible=s1.iv;p1.onGround=s1.og;p1.charIdx=s1.ci;p1.hitStun=s1.hs;p1.slowTimer=s1.sl;p1.ultActive=s1.ua;
      p2.x=s2.x;p2.y=s2.y;p2.hp=s2.hp;p2.vx=s2.vx;p2.vy=s2.vy;p2.facing=s2.f;p2.cd1=s2.c1;p2.cd2=s2.c2;p2.ultCharge=s2.uc;p2.frozen=s2.fr;p2.shield=s2.sh;p2.armor=s2.ar;p2.invincible=s2.iv;p2.onGround=s2.og;p2.charIdx=s2.ci;p2.hitStun=s2.hs;p2.slowTimer=s2.sl;p2.ultActive=s2.ua;
      projectiles=msg.pj||[];effects=msg.ef||[];items=msg.it||[];traps=msg.tr||[];screenShake=msg.sk||0;
      if(gameState!=='playing')beginPlaying();
    }
    if(msg.type==='gameover'){
      gameState='result';
      let isMe=msg.winner===localPlayerId;
      document.getElementById('result-title').textContent=(isMe?'你':'对手')+' 获胜！';
      document.getElementById('result-detail').textContent=msg.winnerName+' 取得了胜利';
      if(msg.winnerName===currentUser){currentWins=msg.wins;document.getElementById('wins-display').textContent='🏆 '+msg.wins+'胜';}
      showScreen('result-screen');document.getElementById('hud').style.display='none';
    }
  };
  ws.onerror=()=>{};ws.onclose=()=>{};
}
function sendNet(msg){if(ws&&ws.readyState===1)ws.send(JSON.stringify(msg));}
function joinOnline(){document.getElementById('online-status').textContent='正在加入房间...';if(!ws||ws.readyState!==1){document.getElementById('online-status').textContent='未连接服务器，请刷新';return;}ws.send(JSON.stringify({type:'join',room:'1234'}));}
function doLogin(){let u=document.getElementById('login-user').value.trim(),p=document.getElementById('login-pass').value;if(!u||!p){document.getElementById('login-msg').textContent='请输入用户名和密码';return;}document.getElementById('login-msg').textContent='';if(!ws||ws.readyState!==1){connectWS();setTimeout(()=>doLogin(),500);return;}ws.send(JSON.stringify({type:'login',user:u,pass:p}));}
function logout(){localStorage.removeItem('arena-auth');currentUser='';currentWins=0;document.getElementById('user-bar').style.display='none';showScreen('login-screen');}
function showPwScreen(){document.getElementById('pw-old').value='';document.getElementById('pw-new').value='';document.getElementById('pw-new2').value='';document.getElementById('pw-msg').textContent='';showScreen('pw-screen');}
function doChangePw(){let old=document.getElementById('pw-old').value,n1=document.getElementById('pw-new').value,n2=document.getElementById('pw-new2').value;if(n1!==n2){document.getElementById('pw-msg').textContent='两次密码不一致';return;}if(n1.length<4){document.getElementById('pw-msg').textContent='新密码至少4位';return;}sendNet({type:'change-pw',old:old,new:n1});}
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
connectWS();
</script>
</body>
