<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e0e0e0;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{text-align:center}
h1{font-size:3rem;background:linear-gradient(135deg,#ff6ec4,#7873f5,#4aeadc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2.5rem}
.games{display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
a{display:block;padding:2rem 3rem;font-size:1.3rem;border:2px solid #7873f5;background:transparent;color:#e0e0e0;border-radius:12px;text-decoration:none;transition:all .3s;min-width:200px}
a:hover{background:#7873f5;color:#fff;box-shadow:0 0 25px rgba(120,115,245,.5)}
</style>
</head>
<body>
<div class="container">
  <h1>Games</h1>
  <div class="games">
    <a href="/tetris/">Tetris</a>
    <a href="/shooting/">Shooting</a>
  </div>
</div>
</body>
</html>
