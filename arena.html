<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>竞技之巅 - 双人对战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
body{background:#0a0a1a;color:#e0e0e0;font-family:'Segoe UI',sans-serif;overflow:hidden;width:100vw;height:100vh}
canvas{display:block;width:100vw;height:100vh}

#ui-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#ui-layer *{pointer-events:auto}

.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}

#menu-screen{background:linear-gradient(135deg,#0a0a2e,#1a0a3e,#0a1a3e)}
#menu-screen h1{font-size:4rem;background:linear-gradient(135deg,#ff6ec4,#7873f5,#4aeadc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem;animation:float 3s ease-in-out infinite}
#menu-screen .subtitle{color:#888;font-size:1.1rem;margin-bottom:3rem;letter-spacing:4px}
.menu-btn{display:block;margin:.6rem;padding:1rem 3.5rem;font-size:1.2rem;border:2px solid #7873f5;background:rgba(120,115,245,.1);color:#e0e0e0;border-radius:14px;cursor:pointer;transition:all .3s;min-width:280px;letter-spacing:2px}
.menu-btn:hover{background:rgba(120,115,245,.4);box-shadow:0 0 30px rgba(120,115,245,.4);transform:scale(1.05)}

#select-screen{background:linear-gradient(135deg,#0a0a2e,#1a0a3e)}
.select-title{font-size:2rem;margin-bottom:1.5rem;color:#fff}
.select-area{display:flex;gap:60px;margin-bottom:2rem}
.player-select{text-align:center}
.player-select h2{font-size:1.3rem;margin-bottom:1rem;background:linear-gradient(90deg,#ff6ec4,#7873f5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.char-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.char-card{width:100px;height:120px;border:2px solid rgba(255,255,255,.15);border-radius:12px;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.03)}
.char-card:hover{border-color:#7873f5;background:rgba(120,115,245,.15)}
.char-card.selected{border-color:#4aeadc;background:rgba(74,234,220,.15);box-shadow:0 0 20px rgba(74,234,220,.3)}
.char-card .char-icon{font-size:2.5rem;margin-bottom:4px}
.char-card .char-name{font-size:.75rem;color:#ccc}
.char-info{width:310px;min-height:140px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px;text-align:left;font-size:.8rem;line-height:1.7}
.char-info .ci-name{font-size:1.1rem;font-weight:bold;margin-bottom:6px}
.char-info .ci-skill{color:#aaa}
.char-info .ci-skill b{color:#4aeadc}
.char-info .ci-ult b{color:#ff6ec4}

#map-screen{background:linear-gradient(135deg,#0a0a2e,#0a1a3e)}
.map-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:2rem}
.map-card{width:200px;height:140px;border:2px solid rgba(255,255,255,.15);border-radius:14px;cursor:pointer;transition:all .3s;overflow:hidden;position:relative}
.map-card:hover{border-color:#7873f5;transform:scale(1.05)}
.map-card.selected{border-color:#4aeadc;box-shadow:0 0 25px rgba(74,234,220,.4)}
.map-card canvas{width:100%;height:100%}
.map-card .map-name{position:absolute;bottom:0;left:0;right:0;padding:6px;text-align:center;background:rgba(0,0,0,.6);font-size:.85rem;letter-spacing:2px}

.start-btn{padding:1rem 4rem;font-size:1.3rem;border:2px solid #4aeadc;background:rgba(74,234,220,.1);color:#e0e0e0;border-radius:14px;cursor:pointer;transition:all .3s;letter-spacing:3px}
.start-btn:hover{background:rgba(74,234,220,.3);box-shadow:0 0 30px rgba(74,234,220,.4)}
.start-btn:disabled{opacity:.3;cursor:not-allowed}

.keys-hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:40px;font-size:.75rem;color:#666}
.keys-hint div{text-align:center;line-height:1.8}
.keys-hint span.k{background:rgba(255,255,255,.1);padding:1px 7px;border-radius:4px;font-family:monospace;margin:0 2px}

#hud{position:absolute;top:0;left:0;width:100%;pointer-events:none;display:none;padding:8px 20px}
.hud-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.hud-row{display:flex;justify-content:space-between;align-items:center;gap:20px}
.hud-block{display:flex;align-items:center;gap:8px}
.hud-name{font-size:1.2rem;font-weight:bold}
.hud-p1-name{color:#4aeadc}
.hud-p2-name{color:#ff6ec4;text-align:right}
.hp-bar-bg{width:420px;height:28px;background:rgba(0,0,0,.6);border-radius:14px;overflow:hidden;border:2px solid rgba(255,255,255,.25);position:relative}
.hp-bar{height:100%;border-radius:14px;transition:width .3s}
.hp-bar-p1{background:linear-gradient(90deg,#4aeadc,#7873f5)}
.hp-bar-p2{background:linear-gradient(270deg,#ff6ec4,#f5a623)}
.skill-icons{display:flex;gap:6px}
.skill-icon{width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:1.1rem;position:relative}
.skill-icon .cd-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);border-radius:0 0 7px 7px;text-align:center;font-size:.6rem;color:#ff6ec4}
.ult-bar-bg{width:100px;height:6px;background:rgba(0,0,0,.4);border-radius:3px;margin-top:2px}
.ult-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#f5a623,#ff6ec4);transition:width .2s}

#result-screen{background:rgba(0,0,0,.75)}
#result-screen h1{font-size:3rem;margin-bottom:1rem}
#result-screen .winner-text{font-size:1.5rem;margin-bottom:2rem;color:#4aeadc}
#online-screen{background:linear-gradient(135deg,#0a0a2e,#1a0a3e)}
#login-screen{background:linear-gradient(135deg,#0a0a2e,#1a0a3e,#0a1a3e)}
#login-screen input{width:220px;padding:10px 14px;font-size:1rem;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.2);border-radius:10px;color:#e0e0e0;font-family:'Segoe UI',sans-serif;margin-bottom:.8rem;display:block;margin-left:auto;margin-right:auto}
#login-screen input::placeholder{color:#555}
.user-bar{position:absolute;top:12px;right:20px;display:flex;align-items:center;gap:12px;font-size:.85rem;z-index:5}
.user-bar .username{color:#4aeadc;font-weight:bold}
.user-bar .wins{color:#f5c542}
.user-bar button{padding:4px 12px;font-size:.75rem;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:#aaa;border-radius:6px;cursor:pointer}
.user-bar button:hover{background:rgba(255,255,255,.15);color:#fff}
#pw-screen{background:linear-gradient(135deg,#0a0a2e,#1a0a3e)}
#pw-screen input{width:220px;padding:10px 14px;font-size:1rem;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.2);border-radius:10px;color:#e0e0e0;margin-bottom:.8rem;display:block;margin-left:auto;margin-right:auto}
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>
<div id="ui-layer">
  <div id="user-bar" class="user-bar" style="display:none">
    <span class="username" id="user-display"></span>
    <span class="wins" id="wins-display"></span>
    <button onclick="showPwScreen()">改密码</button>
    <button onclick="logout()">退出登录</button>
  </div>
  <div id="login-screen" class="screen active">
    <h1 style="font-size:3rem;background:linear-gradient(135deg,#ff6ec4,#7873f5,#4aeadc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2rem">竞技之巅</h1>
    <div style="background:rgba(0,0,0,.6);padding:30px 40px;border-radius:16px;border:1px solid rgba(255,255,255,.1);text-align:center">
      <h2 style="margin-bottom:1.5rem;font-size:1.3rem">登录</h2>
      <input id="login-user" type="text" placeholder="用户名" autofocus>
      <input id="login-pass" type="password" placeholder="密码">
      <button class="menu-btn" style="margin-top:.5rem" onclick="doLogin()">登录</button>
      <div id="login-msg" style="color:#ff6ec4;margin-top:.8rem;font-size:.85rem"></div>
    </div>
  </div>
  <div id="menu-screen" class="screen">
    <h1>竞技之巅</h1>
    <div class="subtitle">ARENA CLASH</div>
    <button class="menu-btn" onclick="goToOnline()">在线联机</button>
    <button class="menu-btn" onclick="showHelp()">操作说明</button>
  </div>
  <div id="pw-screen" class="screen">
    <div style="background:rgba(0,0,0,.6);padding:30px 40px;border-radius:16px;border:1px solid rgba(255,255,255,.1);text-align:center">
      <h2 style="margin-bottom:1.5rem;font-size:1.3rem">修改密码</h2>
      <input id="pw-old" type="password" placeholder="旧密码">
      <input id="pw-new" type="password" placeholder="新密码">
      <input id="pw-new2" type="password" placeholder="确认新密码">
      <button class="menu-btn" onclick="doChangePw()">确认修改</button>
      <div id="pw-msg" style="color:#ff6ec4;margin-top:.8rem;font-size:.85rem"></div>
      <button class="menu-btn" style="margin-top:.5rem" onclick="showScreen('menu-screen')">返回</button>
    </div>
  </div>
  <div id="select-screen" class="screen"></div>
  <div id="map-screen" class="screen"></div>
  <div id="hud"></div>
  <div id="result-screen" class="screen">
    <h1 id="result-title"></h1>
    <div class="winner-text" id="result-detail"></div>
    <button class="menu-btn" onclick="rematch()">再来一局</button>
    <button class="menu-btn" onclick="leaveOnline()">返回菜单</button>
  </div>
  <div id="help-screen" class="screen">
    <div style="background:rgba(0,0,0,.85);padding:40px 60px;border-radius:20px;max-width:700px;border:1px solid rgba(255,255,255,.1)">
      <h2 style="margin-bottom:1.5rem;text-align:center">操作说明</h2>
      <div style="font-size:.9rem;line-height:2.2;text-align:center">
        <div>移动：<span class="k">A</span> <span class="k">D</span></div>
        <div>跳跃：<span class="k">W</span></div>
        <div>技能1：<span class="k">J</span></div>
        <div>技能2：<span class="k">K</span></div>
        <div>绝招：<span class="k">L</span></div>
      </div>
      <div style="text-align:center;margin-top:2rem"><button class="menu-btn" onclick="hideHelp()">返回</button></div>
    </div>
  </div>
  <div id="online-screen" class="screen">
    <div style="background:rgba(0,0,0,.85);padding:40px 60px;border-radius:20px;max-width:500px;border:1px solid rgba(255,255,255,.1);text-align:center">
      <h2 style="margin-bottom:1rem">在线联机</h2>
      <p style="color:#888;font-size:.85rem;margin-bottom:1.5rem">点击加入房间，等待对手连接</p>
      <button class="menu-btn" onclick="joinOnline()">加入房间</button>
      <div id="online-status" style="color:#4aeadc;margin-top:1rem;font-size:.9rem"></div>
      <button class="menu-btn" style="margin-top:.5rem" onclick="leaveOnline()">返回</button>
    </div>
  </div>
</div>

<script>
const W=1200,H=700;
const GRAVITY=0.6,JUMP_FORCE=-14,MOVE_SPEED=5,MAX_HP=100;
const canvas=document.getElementById('game-canvas');
const ctx=canvas.getContext('2d');
canvas.width=W;canvas.height=H;

const CHARACTERS=[
  {
    id:'warrior',name:'剑士',icon:'⚔️',color:'#4aeadc',
    desc:'近战高手，攻守兼备',
    skill1:{name:'横斩',key:'',icon:'🗡️',cd:1.5,desc:'向前挥砍，伤害15',
      exec(p,o){spawnSlash(p,o,80,40,15,p.color);}},
    skill2:{name:'剑盾冲锋',key:'',icon:'🛡️',cd:4,desc:'护盾冲撞，免疫伤害，撞到敌人击飞+12伤害',
      exec(p,o){p.shield=45;p.vx=p.facing*16;
        setTimeout(()=>{if(gameState!=='playing')return;
          if(Math.abs(p.x-o.x)<60&&Math.abs(p.y-o.y)<50){applyDmg(o,12,p);o.vx=p.facing*14;o.vy=-8;}
        },200);}},
    ult:{name:'剑气风暴',icon:'⚡',charge:60,desc:'三连巨型斩击，共42伤害',
      exec(p,o){
        p.invincible=30;screenShake=15;
        for(let i=0;i<3;i++)setTimeout(()=>{if(gameState!=='playing')return;
          spawnSlash(p,o,180,80,14,p.color);
          for(let j=0;j<10;j++)particles.push(mkParticle(p.x+p.facing*60,p.y,'#4aeadc'));
        },i*150);
      }}
  },
  {
    id:'mage',name:'法师',icon:'🔮',color:'#a855f7',
    desc:'远程控制，技能多变',
    skill1:{name:'火球',key:'',icon:'🔥',cd:2,desc:'发射火球，伤害18',
      exec(p,o){spawnProjectile(p,p.facing*8,0,30,30,18,'#ff6b35','🔥');}},
    skill2:{name:'传送',key:'',icon:'🌀',cd:5,desc:'向面朝方向瞬移一段距离',
      exec(p,o){
        for(let i=0;i<10;i++)particles.push(mkParticle(p.x,p.y,'#a855f7'));
        p.x+=p.facing*180;
        if(p.x<20)p.x=20;if(p.x>W-20)p.x=W-20;
        p.invincible=15;
        for(let i=0;i<10;i++)particles.push(mkParticle(p.x,p.y,'#a855f7'));}},
    ult:{name:'流星火雨',icon:'☄️',charge:60,desc:'天降5颗流星追踪敌人，共35伤害',
      exec(p,o){for(let i=0;i<5;i++)setTimeout(()=>{if(gameState!=='playing')return;let mx=o.x+((Math.random()-.5)*120);effects.push({type:'meteor',x:mx,y:-50,vy:12,dmg:7,hit:false,color:'#ff4500',target:o,attacker:p,timer:120});},i*150);}}
  },
  {
    id:'ninja',name:'忍者',icon:'🌀',color:'#22c55e',
    desc:'高速突进，背刺暴击',
    skill1:{name:'手里剑',key:'',icon:'⭐',cd:1.5,desc:'快速三连投掷，每颗5伤害',
      exec(p,o){for(let i=0;i<3;i++)setTimeout(()=>{if(gameState!=='playing')return;
        spawnProjectile(p,p.facing*13,(i-1)*2,16,16,5,'#22c55e','⭐');},i*80);}},
    skill2:{name:'影步',key:'',icon:'💨',cd:3,desc:'瞬移到对手身后，下次攻击暴击(2倍)',
      exec(p,o){p.x=o.x-o.facing*60;p.y=o.y;p.facing=-o.facing;p.critNext=true;
        for(let i=0;i<12;i++)particles.push(mkParticle(p.x,p.y+20,'#22c55e'));}},
    ult:{name:'千影乱舞',icon:'🌪️',charge:60,desc:'高速连击锁定敌人，共45伤害',
      exec(p,o){p.ultActive=true;p.ultTimer=60;p.ultTarget=o;p.invincible=60;}}
  },
  {
    id:'archer',name:'弓手',icon:'🏹',color:'#f59e0b',
    desc:'远程狙击，区域控制',
    skill1:{name:'蓄力箭',key:'',icon:'🏹',cd:2,desc:'高速穿透箭，伤害16',
      exec(p,o){spawnProjectile(p,p.facing*16,0,45,6,16,'#f59e0b','→');}},
    skill2:{name:'后跳射',key:'',icon:'🔙',cd:3,desc:'后跳闪避并射出散射箭(3箭各8伤害)',
      exec(p,o){p.vx=-p.facing*10;p.vy=-8;
        setTimeout(()=>{if(gameState!=='playing')return;
          for(let i=-1;i<=1;i++)spawnProjectile(p,p.facing*11,i*3,25,8,8,'#f59e0b','→');},150);}},
    ult:{name:'万箭齐发',icon:'🌟',charge:60,desc:'向前扇形箭雨，共40伤害',
      exec(p,o){for(let i=0;i<8;i++)setTimeout(()=>{if(gameState!=='playing')return;
        spawnProjectile(p,p.facing*14,(i-3.5)*1.5,30,8,5,'#f59e0b','→');},i*60);}}
  },
  {
    id:'tank',name:'铁壁',icon:'🛡️',color:'#3b82f6',
    desc:'血厚防高，近身控制',
    skill1:{name:'重拳',key:'',icon:'👊',cd:2,desc:'重击+击退，伤害18',
      exec(p,o){let hit=spawnSlash(p,o,70,50,18,p.color);if(hit){o.vx=p.facing*12;o.vy=-5;}}},
    skill2:{name:'大地钉',key:'',icon:'🪨',cd:5,desc:'砸地制造震波，范围内敌人眩晕1秒+10伤害',
      exec(p,o){screenShake=8;
        effects.push({type:'groundwave',x:p.x,y:p.groundY||p.y+28,timer:20,color:p.color,w:200});
        let dist=Math.abs(o.x-p.x);
        if(dist<200&&Math.abs(o.y-p.y)<60){applyDmg(o,10,p);o.frozen=60;}
        for(let i=0;i<12;i++)particles.push(mkParticle(p.x+(Math.random()-.5)*150,p.groundY||p.y+28,'#3b82f6'));}},
    ult:{name:'大地震击',icon:'💥',charge:60,desc:'全屏地震，伤害35+击飞',
      exec(p,o){screenShake=25;let dx=o.x-p.x,dist=Math.abs(dx);if(dist<500){applyDmg(o,35,p);o.vy=-12;o.vx=(dx>0?1:-1)*8;}
        for(let i=0;i<25;i++)particles.push(mkParticle(p.x+(Math.random()-0.5)*300,p.groundY||H-100,'#3b82f6'));}}
  },
  {
    id:'spirit',name:'灵狐',icon:'🦊',color:'#ec4899',
    desc:'灵活多变，吸血续航',
    skill1:{name:'魅惑弹',key:'',icon:'💜',cd:1.5,desc:'弹射灵弹，命中后减速敌人2秒，伤害10',
      exec(p,o){spawnProjectile(p,p.facing*9,-3,25,25,10,'#ec4899','✦',()=>{o.slowTimer=120;});}},
    skill2:{name:'生命汲取',key:'',icon:'💚',cd:5,desc:'吸取范围内敌人15HP回复自身',
      exec(p,o){let dist=Math.abs(o.x-p.x);
        if(dist<150&&Math.abs(o.y-p.y)<80){
          applyDmg(o,15,p);p.hp=Math.min(MAX_HP,p.hp+15);
          for(let i=0;i<8;i++){particles.push(mkParticle(o.x,o.y,'#ff4488'));particles.push(mkParticle(p.x,p.y,'#22ff88'));}
          effects.push({type:'drain',x1:o.x,y1:o.y,x2:p.x,y2:p.y,timer:20,color:'#22ff88'});
        }else{
          for(let i=0;i<4;i++)particles.push(mkParticle(p.x,p.y,'#888'));
        }}},
    ult:{name:'九尾幻象',icon:'🦊',charge:60,desc:'召唤3个分身围攻，共42伤害',
      exec(p,o){for(let i=0;i<3;i++){let ox=p.x+(i-1)*80,oy=p.y;
        setTimeout(()=>{if(gameState!=='playing')return;
          effects.push({type:'clone',x:ox,y:oy,facing:p.facing,target:o,timer:40,dmg:14,color:p.color,hit:false,attacker:p});},i*200);}}}
  }
];

const MAPS=[
  {
    id:'dojo',name:'天空道场',
    bg:['#1a1040','#2a1860'],
    platforms:[{x:100,y:550,w:1000,h:30},{x:250,y:400,w:250,h:18},{x:700,y:400,w:250,h:18},{x:450,y:270,w:300,h:18}],
    decos:[{type:'circle',x:600,y:100,r:60,color:'rgba(255,200,100,.15)'}]
  },
  {
    id:'volcano',name:'熔岩地狱',
    bg:['#2a0a00','#1a0500'],
    platforms:[{x:50,y:560,w:400,h:30},{x:750,y:560,w:400,h:30},{x:350,y:420,w:300,h:18},{x:200,y:280,w:200,h:18},{x:800,y:280,w:200,h:18}],
    decos:[{type:'lava',y:650}],
    hazard:{y:640,dmg:2}
  },
  {
    id:'sky',name:'云端之城',
    bg:['#0a1a3e','#1a3060'],

let gameState='menu';
let p1=null,p2=null,selectedMap=null;
let sel1=0,sel2=1;
let projectiles=[],particles=[],effects=[],traps=[],items=[];
let screenShake=0;
let keysDown={};
let itemSpawnTimer=0;

function mkPlayer(id,charIdx,x,facing){
  let ch=CHARACTERS[charIdx];
  return{
    id,x,y:300,vx:0,vy:0,w:36,h:56,facing,
    hp:MAX_HP,color:ch.color,char:ch,charIdx,
    cd1:0,cd2:0,ultCharge:0,
    shield:0,armor:0,frozen:0,invincible:0,
    onGround:false,groundY:0,
    ultActive:false,ultTimer:0,ultTarget:null,
    hitStun:0,animState:'idle',animTimer:0,
    critNext:false,slowTimer:0
  };
}

function mkParticle(x,y,color){
  return{x,y,vx:(Math.random()-.5)*6,vy:-Math.random()*5-2,life:1,decay:.02+Math.random()*.02,size:2+Math.random()*4,color};
}

function spawnSlash(p,o,w,h,dmg,color){
  if(p.critNext){dmg*=2;p.critNext=false;}
  let sx=p.x+p.facing*(p.w/2+w/2-10),sy=p.y;
  effects.push({type:'slash',x:sx,y:sy,w,h,timer:12,color,facing:p.facing});
  let hit=false;
  if(Math.abs(o.x-sx)<(w/2+o.w/2)&&Math.abs(o.y-sy)<(h/2+o.h/2)){
    applyDmg(o,dmg,p);hit=true;
  }
  return hit;
}

function spawnProjectile(p,vx,vy,w,h,dmg,color,icon,onHit){
  if(p.critNext){dmg*=2;p.critNext=false;}
  projectiles.push({x:p.x+p.facing*30,y:p.y,vx,vy,w,h,dmg,color,icon,owner:p,timer:180,onHit:onHit||null});
}

function applyDmg(target,dmg,attacker){
  if(target.invincible>0)return;
  if(target.shield>0){dmg=Math.floor(dmg*.3);target.shield=0;}
  if(target.armor>0)dmg=Math.floor(dmg*.5);
  target.hp=Math.max(0,target.hp-dmg);
  target.hitStun=8;
  target.vy=-3;
  if(attacker)attacker.ultCharge=Math.min(60,attacker.ultCharge+dmg*.6);
  screenShake=Math.max(screenShake,4);
  for(let i=0;i<6;i++)particles.push(mkParticle(target.x,target.y,target.color));
}

function updatePlayer(p,o,dt){
  if(p.frozen>0){p.frozen--;return;}
  if(p.hitStun>0)p.hitStun--;
  if(p.shield>0)p.shield--;
  if(p.armor>0)p.armor--;
  if(p.invincible>0)p.invincible--;
  if(p.slowTimer>0)p.slowTimer--;
  if(p.cd1>0)p.cd1-=1/60;
  if(p.cd2>0)p.cd2-=1/60;

  if(p.ultActive){
    p.ultTimer--;
    if(p.ultTimer%10===0&&p.ultTarget){
      let tx=p.ultTarget.x,ty=p.ultTarget.y;
      p.x+=(tx-p.x)*.3;p.y+=(ty-p.y)*.3;
      p.facing=tx>p.x?1:-1;
      spawnSlash(p,p.ultTarget,60,50,9,p.color);
    }
    if(p.ultTimer<=0){p.ultActive=false;p.invincible=0;}
    return;
  }

  let keys={left:'a',right:'d',jump:'w'};
  let isLocalPlayer=(p.id===localPlayerId);

  if(p.hitStun<=0){
    if(isLocalPlayer){
      let spd=p.slowTimer>0?MOVE_SPEED*0.4:MOVE_SPEED;
      if(keysDown[keys.left]){p.vx=-spd;p.facing=-1;}
      else if(keysDown[keys.right]){p.vx=spd;p.facing=1;}
      else p.vx*=.7;
      if(keysDown[keys.jump]&&p.onGround){p.vy=JUMP_FORCE;p.onGround=false;keysDown[keys.jump]=false;}
    }else{
      if(Math.abs(p.vx)<0.5)p.vx*=.7;
    }
  }else{
    p.vx*=.8;
  }

  p.vy+=GRAVITY;
  p.x+=p.vx;p.y+=p.vy;

  p.onGround=false;
  let map=MAPS[selectedMap];
  for(let pl of map.platforms){
    if(p.x+p.w/2>pl.x&&p.x-p.w/2<pl.x+pl.w&&
       p.y+p.h/2>=pl.y&&p.y+p.h/2<=pl.y+pl.h+12&&p.vy>=0){
      p.y=pl.y-p.h/2;p.vy=0;p.onGround=true;p.groundY=pl.y;
    }
  }
  if(p.x<20)p.x=20;if(p.x>W-20)p.x=W-20;
  if(p.y>H+100){p.y=100;p.x=W/2;p.vy=0;applyDmg(p,15,null);}

  if(map.hazard&&p.y+p.h/2>map.hazard.y){applyDmg(p,map.hazard.dmg,null);}

  for(let i=traps.length-1;i>=0;i--){
    let t=traps[i];
    if(t.owner===p)continue;
    if(Math.abs(p.x-t.x)<30&&Math.abs((p.y+p.h/2)-t.y)<20){
      applyDmg(p,t.dmg,t.owner);p.frozen=60;
      for(let j=0;j<8;j++)particles.push(mkParticle(t.x,t.y,t.color));
      traps.splice(i,1);
    }
  }
}

function updateProjectiles(){
  for(let i=projectiles.length-1;i>=0;i--){
    let pr=projectiles[i];
    pr.x+=pr.vx;pr.y+=pr.vy;pr.timer--;
    let target=pr.owner===p1?p2:p1;
    if(Math.abs(pr.x-target.x)<(pr.w/2+target.w/2)&&Math.abs(pr.y-target.y)<(pr.h/2+target.h/2)){
      applyDmg(target,pr.dmg,pr.owner);
      if(pr.onHit)pr.onHit();
      for(let j=0;j<5;j++)particles.push(mkParticle(pr.x,pr.y,pr.color));
      projectiles.splice(i,1);continue;
    }
    if(pr.timer<=0||pr.x<-50||pr.x>W+50||pr.y>H+50){projectiles.splice(i,1);}
  }
}

function updateEffects(){
  for(let i=effects.length-1;i>=0;i--){
    let e=effects[i];
    e.timer--;
    if(e.type==='meteor'){
      e.y+=e.vy;
      if(!e.hit&&e.y>=e.target.y-30&&Math.abs(e.x-e.target.x)<50){
        applyDmg(e.target,e.dmg,e.attacker||null);e.hit=true;
        for(let j=0;j<10;j++)particles.push(mkParticle(e.x,e.y,'#ff4500'));
      }
    }
    if(e.type==='clone'&&!e.hit&&e.timer<20){
      let t=e.target;
      if(Math.abs(e.x-t.x)<60&&Math.abs(e.y-t.y)<60){
        applyDmg(t,e.dmg,e.attacker||null);e.hit=true;
      }
    }
    if(e.timer<=0){effects.splice(i,1);}
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }
}

function drawMap(){
  let map=MAPS[selectedMap];
  let g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,map.bg[0]);g.addColorStop(1,map.bg[1]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  for(let d of map.decos){
    if(d.type==='circle'){ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fillStyle=d.color;ctx.fill();}
    if(d.type==='lava'){
      let lg=ctx.createLinearGradient(0,d.y-30,0,H);
      lg.addColorStop(0,'rgba(255,80,0,.6)');lg.addColorStop(1,'rgba(200,30,0,.8)');
      ctx.fillStyle=lg;ctx.fillRect(0,d.y-20,W,H-d.y+20);
    }
    if(d.type==='cloud'){
      ctx.fillStyle='rgba(255,255,255,.08)';
      ctx.beginPath();ctx.ellipse(d.x,d.y,80,30,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(d.x+40,d.y+10,50,20,0,0,Math.PI*2);ctx.fill();
    }
    if(d.type==='pillar'){
      ctx.fillStyle='rgba(200,180,100,.15)';ctx.fillRect(d.x-10,d.y-80,20,80);
    }
  }

  for(let pl of map.platforms){
    let pg=ctx.createLinearGradient(pl.x,pl.y,pl.x,pl.y+pl.h);
    pg.addColorStop(0,'rgba(255,255,255,.2)');pg.addColorStop(1,'rgba(255,255,255,.05)');
    ctx.fillStyle=pg;
    ctx.beginPath();
    ctx.roundRect(pl.x,pl.y,pl.w,pl.h,4);
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(pl.x,pl.y,pl.w,pl.h,4);ctx.stroke();
  }
}

    ctx.beginPath();ctx.moveTo(bx+f*18,by-18+breathe);ctx.lineTo(bx+f*18,by+22+breathe);ctx.stroke();
    ctx.lineWidth=1;
  }
  else if(cid==='tank'){
    // 头（厚重头盔）
    let hg=ctx.createLinearGradient(bx-16,by-28,bx+16,by-8);
    hg.addColorStop(0,'#4466aa');hg.addColorStop(0.5,'#5577cc');hg.addColorStop(1,'#3355aa');
    ctx.fillStyle=hg;
    ctx.fillRect(bx-16,by-28+breathe,32,22);
    ctx.fillStyle=p.color;
    ctx.fillRect(bx-16,by-28+breathe,32,4);
    // 面罩T字
    ctx.fillStyle='#223';
    ctx.fillRect(bx-10,by-22+breathe,20,14);
    ctx.fillStyle='#ff8';
    ctx.fillRect(bx-8,by-20+breathe,16,4);
    ctx.fillStyle='#ff8';
    ctx.fillRect(bx-2,by-20+breathe,4,10);
    // 身体（巨型重甲）
    let bg=ctx.createLinearGradient(bx-18,by-6,bx+18,by+26);
    bg.addColorStop(0,'#4466aa');bg.addColorStop(0.5,'#5577bb');bg.addColorStop(1,'#3355aa');
    ctx.fillStyle=bg;
    ctx.fillRect(bx-18,by-6+breathe,36,32);
    ctx.fillStyle=p.color;
    ctx.fillRect(bx-18,by-6+breathe,36,4);
    // 胸口纹章
    ctx.fillStyle='rgba(255,255,255,.15)';
    ctx.beginPath();ctx.arc(bx,by+8+breathe,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(bx,by+8+breathe,4,0,Math.PI*2);ctx.fill();
    // 肩甲（大）
    ctx.fillStyle='#5577bb';
    ctx.beginPath();ctx.arc(bx-18,by-4+breathe,9,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(bx+18,by-4+breathe,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(bx-18,by-4+breathe,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(bx+18,by-4+breathe,4,0,Math.PI*2);ctx.fill();
    // 腿
    ctx.fillStyle='#3355aa';
    ctx.fillRect(bx-14,by+26+breathe,12,12);
    ctx.fillRect(bx+2,by+26+breathe,12,12);
    ctx.fillStyle=p.color;
    ctx.fillRect(bx-14,by+26+breathe,12,3);
    ctx.fillRect(bx+2,by+26+breathe,12,3);
    // 拳套（发光）
    ctx.shadowColor=p.color;ctx.shadowBlur=8;
    ctx.fillStyle=p.color;
    ctx.fillRect(bx+f*20,by+4+breathe,10,12);
    ctx.fillStyle='rgba(255,255,255,.3)';
    ctx.fillRect(bx+f*20,by+4+breathe,10,4);
  }
  else if(cid==='spirit'){
    // 狐耳（更精致）
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.moveTo(bx-11,by-18+breathe);ctx.lineTo(bx-6,by-38+breathe);ctx.lineTo(bx-1,by-18+breathe);ctx.fill();
    ctx.beginPath();ctx.moveTo(bx+1,by-18+breathe);ctx.lineTo(bx+6,by-38+breathe);ctx.lineTo(bx+11,by-18+breathe);ctx.fill();
    // 耳内
    ctx.fillStyle='#ffaaaa';
    ctx.beginPath();ctx.moveTo(bx-9,by-20+breathe);ctx.lineTo(bx-6,by-33+breathe);ctx.lineTo(bx-3,by-20+breathe);ctx.fill();
    ctx.beginPath();ctx.moveTo(bx+3,by-20+breathe);ctx.lineTo(bx+6,by-33+breathe);ctx.lineTo(bx+9,by-20+breathe);ctx.fill();
    // 头
    ctx.fillStyle='#ffe4d0';
    ctx.beginPath();ctx.arc(bx,by-14+breathe,12,0,Math.PI*2);ctx.fill();
    // 腮红
    ctx.fillStyle='rgba(255,150,150,.3)';
    ctx.beginPath();ctx.ellipse(bx-7,by-10+breathe,4,2,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(bx+7,by-10+breathe,4,2,0,0,Math.PI*2);ctx.fill();
    // 眼睛（狐狸眼，更精致）
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.ellipse(bx+f*5,by-15+breathe,5,3,f*0.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.ellipse(bx+f*5,by-15+breathe,3,2.5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.arc(bx+f*5,by-15+breathe,1.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(bx+f*4,by-16+breathe,0.8,0,Math.PI*2);ctx.fill();
    // 身体（和服，带花纹）
    let kg=ctx.createLinearGradient(bx-14,by-3,bx+14,by+30);
    kg.addColorStop(0,p.color);kg.addColorStop(1,'#be185d');
    ctx.fillStyle=kg;
    ctx.beginPath();ctx.moveTo(bx-13,by-3+breathe);ctx.lineTo(bx+13,by-3+breathe);ctx.lineTo(bx+15,by+30);ctx.lineTo(bx-15,by+30);ctx.fill();
    // 和服花纹
    ctx.fillStyle='rgba(255,255,255,.1)';
    ctx.beginPath();ctx.arc(bx-6,by+8,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(bx+8,by+16,3,0,Math.PI*2);ctx.fill();
    // 衣领
    ctx.fillStyle='rgba(255,255,255,.25)';
    ctx.beginPath();ctx.moveTo(bx-5,by-3+breathe);ctx.lineTo(bx+5,by-3+breathe);ctx.lineTo(bx+2,by+12);ctx.lineTo(bx-2,by+12);ctx.fill();
    // 腰带
    ctx.fillStyle='#f5c542';
    ctx.fillRect(bx-14,by+10,28,5);
    ctx.fillStyle='rgba(255,255,255,.2)';
    ctx.fillRect(bx-3,by+10,6,5);
    // 三条尾巴（飘动）
    ctx.strokeStyle=p.color;ctx.lineWidth=4;ctx.lineCap='round';
    for(let ti=0;ti<3;ti++){
      let toff=ti*0.8;
      let spread=(ti-1)*12;
      ctx.beginPath();
      ctx.moveTo(bx-f*10,by+20+spread*0.3);
      ctx.quadraticCurveTo(bx-f*28,by+12+spread+Math.sin(tt+toff)*8,bx-f*38,by-5+spread*0.5+Math.cos(tt+toff)*7);
      ctx.stroke();
    }
    // 尾巴尖发光
    ctx.shadowColor=p.color;ctx.shadowBlur=12;
    for(let ti=0;ti<3;ti++){
      let toff=ti*0.8;
      let spread=(ti-1)*12;
      let tipX=bx-f*38;
      let tipY=by-5+spread*0.5+Math.cos(tt+toff)*7;
      ctx.fillStyle='rgba(255,255,255,.5)';
      ctx.beginPath();ctx.arc(tipX,tipY,3,0,Math.PI*2);ctx.fill();
    }
    ctx.lineWidth=1;ctx.lineCap='butt';
  }

  ctx.shadowBlur=0;

  // 玩家编号标签
  let labelColor=p.id===1?'#4aeadc':'#ff6ec4';
  let labelText='P'+p.id;
  ctx.font='bold 13px Segoe UI';ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillStyle='rgba(0,0,0,.5)';
  ctx.fillRect(bx-16,by-50,32,16);
  ctx.strokeStyle=labelColor;ctx.lineWidth=1;
  ctx.strokeRect(bx-16,by-50,32,16);
  ctx.fillStyle=labelColor;
  ctx.fillText(labelText,bx,by-36);

  if(p.shield>0){
    ctx.strokeStyle='rgba(74,234,220,.6)';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(bx,by,p.w+6,0,Math.PI*2);ctx.stroke();
  }
  if(p.armor>0){
    ctx.strokeStyle='rgba(59,130,246,.5)';ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(bx,by,p.w+8,0,Math.PI*2);ctx.stroke();
  }

  ctx.filter='none';ctx.restore();
}

function spawnItem(){
  let map=MAPS[selectedMap];
  let plat=map.platforms[Math.floor(Math.random()*map.platforms.length)];
  let ix=plat.x+40+Math.random()*(plat.w-80);
  let iy=plat.y-30;
  let types=[
    {type:'heal',amount:20,color:'#22ff88',icon:'❤️'},
    {type:'heal',amount:35,color:'#ff4488',icon:'💖'},
    {type:'energy',amount:20,color:'#f5c542',icon:'⚡'}
  ];
  let t=types[Math.floor(Math.random()*types.length)];
  items.push({x:ix,y:iy,...t,timer:600,bobTimer:0});
}

function updateItems(){
  if(isOnline&&!isHost)return;
  itemSpawnTimer++;
  if(itemSpawnTimer>=480){itemSpawnTimer=0;if(items.length<3)spawnItem();}
  for(let i=items.length-1;i>=0;i--){
    let it=items[i];
    it.timer--;it.bobTimer++;
    if(it.timer<=0){items.splice(i,1);continue;}
    [p1,p2].forEach(p=>{
      if(!p||p.hp<=0)return;
      if(Math.abs(p.x-it.x)<30&&Math.abs(p.y-it.y)<40){
        if(it.type==='heal'){p.hp=Math.min(MAX_HP,p.hp+it.amount);}
        else if(it.type==='energy'){p.ultCharge=Math.min(60,p.ultCharge+it.amount);}
        for(let j=0;j<8;j++)particles.push(mkParticle(it.x,it.y,it.color));
        items.splice(i,1);
      }
    });
  }
}

function drawItems(){
  for(let it of items){
    ctx.save();
    let bob=Math.sin(it.bobTimer*.05)*5;
    let alpha=it.timer<120?it.timer/120:1;
    ctx.globalAlpha=alpha;
    ctx.shadowColor=it.color;ctx.shadowBlur=15;
    ctx.fillStyle=it.color;
    ctx.beginPath();ctx.arc(it.x,it.y+bob,12,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(it.icon,it.x,it.y+bob);
    ctx.restore();
  }
}

function drawEffects(){
  for(let e of effects){
    ctx.save();
    if(e.type==='slash'){
      ctx.globalAlpha=e.timer/12;
      ctx.fillStyle=e.color;
      ctx.shadowColor=e.color;ctx.shadowBlur=15;
      let sx=e.facing===1?e.x-e.w/2:e.x-e.w/2;
      ctx.fillRect(sx,e.y-e.h/2,e.w,e.h);
      ctx.shadowBlur=0;
    }
    if(e.type==='meteor'){
      ctx.fillStyle=e.color;ctx.shadowColor=e.color;ctx.shadowBlur=20;
      ctx.beginPath();ctx.arc(e.x,e.y,15,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
    if(e.type==='clone'){
      ctx.globalAlpha=.5+.5*(e.timer/40);
      ctx.fillStyle=e.color;
      ctx.beginPath();ctx.roundRect(e.x-18,e.y-28,32,56,6);ctx.fill();
    }
    if(e.type==='groundwave'){
      ctx.globalAlpha=e.timer/20;
      ctx.fillStyle=e.color;ctx.shadowColor=e.color;ctx.shadowBlur=10;
      let spread=(20-e.timer)/20*e.w;
      ctx.fillRect(e.x-spread/2,e.y-4,spread,8);
      ctx.shadowBlur=0;
    }
    if(e.type==='drain'){
      ctx.globalAlpha=e.timer/20;
      ctx.strokeStyle=e.color;ctx.lineWidth=3;ctx.shadowColor=e.color;ctx.shadowBlur=8;
      ctx.beginPath();ctx.moveTo(e.x1,e.y1);ctx.lineTo(e.x2,e.y2);ctx.stroke();
      ctx.shadowBlur=0;ctx.lineWidth=1;
    }
    ctx.restore();
  }
  for(let pr of projectiles){
    ctx.save();ctx.shadowColor=pr.color;ctx.shadowBlur=12;
    ctx.fillStyle=pr.color;
    ctx.beginPath();ctx.arc(pr.x,pr.y,pr.w/2,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
  }
  for(let t of traps){
    ctx.save();ctx.globalAlpha=.6+.3*Math.sin(t.timer*.1);
    ctx.fillStyle=t.color;ctx.fillRect(t.x-15,t.y-5,30,10);
    ctx.restore();
  }
  for(let p of particles){
    ctx.save();ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    ctx.shadowBlur=0;ctx.restore();
  }
}

let lastT=0;
function gameLoop(t){
  if(gameState!=='playing'){return;}
  let dt=Math.min(t-lastT,33);lastT=t;

  updatePlayer(p1,p2,dt);
  updatePlayer(p2,p1,dt);
  updateProjectiles();
  updateEffects();
  updateParticles();
  updateItems();
  for(let i=traps.length-1;i>=0;i--){traps[i].timer--;if(traps[i].timer<=0)traps.splice(i,1);}

  if(screenShake>0)screenShake--;

  ctx.save();
  if(screenShake>0){ctx.translate((Math.random()-.5)*screenShake*2,(Math.random()-.5)*screenShake*2);}
  drawMap();
  drawItems();
  drawPlayer(p1);drawPlayer(p2);
  drawEffects();
  ctx.restore();

  updateHUD();
  netSync();

  if(p1.hp<=0||p2.hp<=0){
    gameState='result';
    let winPid=p1.hp>0?1:2;
    let winnerName=winPid===localPlayerId?currentUser:opponentName;
    let wchar=winPid===1?p1.char.name:p2.char.name;
    document.getElementById('result-title').textContent=(winPid===localPlayerId?'你':'对手')+' 获胜！';
    document.getElementById('result-detail').textContent=winnerName+' ('+wchar+') 取得了胜利';
    if(isHost)sendNet({type:'win-report',winner:winnerName});
    showScreen('result-screen');
    document.getElementById('hud').style.display='none';
    return;
  }

  requestAnimationFrame(gameLoop);
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  if(id)document.getElementById(id).classList.add('active');
}

function showHelp(){showScreen('help-screen');}
function hideHelp(){showScreen('menu-screen');}

function goToSelect(){
  gameState='select';
  localReady=false;remoteReady=false;
  buildSelectScreen();
  showScreen('select-screen');
}

let remoteReady=false,localReady=false;

function buildSelectScreen(){
  let ss=document.getElementById('select-screen');
  let myPid=localPlayerId;
  let myKeys='移动 <span class="k">A</span><span class="k">D</span> 跳跃 <span class="k">W</span><br>技能1 <span class="k">J</span> 技能2 <span class="k">K</span> 绝招 <span class="k">L</span>';
  let mySel=myPid===1?sel1:sel2;
  let otherSel=myPid===1?sel2:sel1;
  let otherCh=CHARACTERS[otherSel];
  let opLabel=opponentName||'对手';
  ss.innerHTML=`<div class="select-title">选择角色 — 你是玩家${myPid}</div>
    <div class="select-area">
      <div class="player-select">
        <h2 style="color:${myPid===1?'#4aeadc':'#ff6ec4'}">你的角色</h2>
        <div class="char-grid" id="grid1"></div>
        <div class="char-info" id="info1"></div>
      </div>
      <div class="player-select">
        <h2 style="color:${myPid===1?'#ff6ec4':'#4aeadc'}">${opLabel}</h2>
        <div class="char-info" id="info2" style="display:flex;align-items:center;justify-content:center;min-height:200px">
          ${remoteReady?`<div><div style="font-size:3rem;margin-bottom:8px">${otherCh.icon}</div><div style="color:${otherCh.color};font-size:1.1rem">${otherCh.name}</div><div style="color:#4aeadc;margin-top:8px">✓ 已确认</div></div>`
          :`<div style="color:#888">等待${opLabel}选择...</div>`}
        </div>
      </div>
    </div>
    <button class="start-btn" id="confirm-btn" onclick="confirmSelect()">${localReady?'✓ 已确认，等待对手...':'确认选择'}</button>
    <div class="keys-hint" style="position:relative;margin-top:1.5rem"><div>${myKeys}</div></div>`;
  let grid=document.getElementById('grid1');
  CHARACTERS.forEach((ch,i)=>{
    let card=document.createElement('div');card.className='char-card';
    if(i===mySel)card.classList.add('selected');
    card.innerHTML=`<div class="char-icon">${ch.icon}</div><div class="char-name">${ch.name}</div>`;
    card.onclick=()=>{
      if(localReady)return;
      if(myPid===1)sel1=i;else sel2=i;
      sendNet({type:'select',charIdx:i});
      buildSelectScreen();
    };
    grid.appendChild(card);
  });
  let ch=CHARACTERS[mySel];
  document.getElementById('info1').innerHTML=`<div class="ci-name" style="color:${ch.color}">${ch.icon} ${ch.name}</div>
    <div style="color:#aaa;margin-bottom:6px">${ch.desc}</div>
    <div class="ci-skill"><b>技能1:</b> ${ch.skill1.name} - ${ch.skill1.desc} (CD:${ch.skill1.cd}s)</div>
    <div class="ci-skill"><b>技能2:</b> ${ch.skill2.name} - ${ch.skill2.desc} (CD:${ch.skill2.cd}s)</div>
    <div class="ci-skill"><b style="color:#ff6ec4">绝招:</b> ${ch.ult.name} - ${ch.ult.desc}</div>`;
  if(localReady)document.getElementById('confirm-btn').disabled=true;
}

function confirmSelect(){
  localReady=true;
  sendNet({type:'confirmed'});
  if(remoteReady)goToMapSelect();
  else buildSelectScreen();
}

function rematch(){
  sendNet({type:'rematch'});
  goToSelect();
}

function goToMapSelect(){
  gameState='mapselect';
  buildMapScreen();
  showScreen('map-screen');
}

function buildMapScreen(){
  let ms=document.getElementById('map-screen');
  let isMapHost=isOnline&&!isHost;
  let myKeyHint='<div>移动 <span class="k">A</span><span class="k">D</span> 跳跃 <span class="k">W</span><br>技能1 <span class="k">J</span> 技能2 <span class="k">K</span> 绝招 <span class="k">L</span></div>';
  if(isMapHost){
    ms.innerHTML=`<div class="select-title">等待房主选择地图...</div>
      <div style="color:#888;font-size:1rem;margin-bottom:2rem">${selectedMap!==null?'已选择: '+MAPS[selectedMap].name:'等待中...'}</div>
      <div class="keys-hint" style="position:relative;margin-top:1.5rem">${myKeyHint}</div>`;
    return;
  }
  ms.innerHTML='<div class="select-title">选择地图</div><div class="map-grid" id="mapgrid"></div><button class="start-btn" id="fight-btn" disabled onclick="startFight()">开始战斗！</button><div class="keys-hint" style="position:relative;margin-top:1.5rem">'+myKeyHint+'</div>';
  let mg=document.getElementById('mapgrid');
  MAPS.forEach((map,i)=>{
    let card=document.createElement('div');card.className='map-card';
    if(selectedMap===i)card.classList.add('selected');
    let cv=document.createElement('canvas');cv.width=200;cv.height=140;
    drawMapThumb(cv,map);
    let label=document.createElement('div');label.className='map-name';label.textContent=map.name;
    card.append(cv,label);
    card.onclick=()=>{selectedMap=i;sendNet({type:'map',mapIdx:i});buildMapScreen();};
    mg.appendChild(card);
  });
  if(selectedMap!==null)document.getElementById('fight-btn').disabled=false;
}

function drawMapThumb(cv,map){
  let c=cv.getContext('2d');
  let g=c.createLinearGradient(0,0,0,140);
  g.addColorStop(0,map.bg[0]);g.addColorStop(1,map.bg[1]);
  c.fillStyle=g;c.fillRect(0,0,200,140);
  let sx=200/W,sy=140/H;
  for(let pl of map.platforms){
    c.fillStyle='rgba(255,255,255,.25)';
    c.fillRect(pl.x*sx,pl.y*sy,pl.w*sx,Math.max(pl.h*sy,3));
  }
}

function startFight(){
  gameState='playing';
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('hud').style.display='block';
  if(isOnline)sendNet({type:'start'});
  let map=MAPS[selectedMap];
  let spawnLeft=map.platforms[0].x+80;
  let spawnRight=map.platforms[map.platforms.length>1?map.platforms.length-1:0].x+map.platforms[map.platforms.length>1?map.platforms.length-1:0].w-80;
  p1=mkPlayer(1,sel1,spawnLeft,1);
  p2=mkPlayer(2,sel2,spawnRight,-1);
  p1.y=100;p2.y=100;
  projectiles=[];particles=[];effects=[];traps=[];items=[];screenShake=0;itemSpawnTimer=300;
  lastT=performance.now();
  requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown',e=>{
  if(keysDown[e.key])return;
  keysDown[e.key]=true;
  if(gameState!=='playing')return;
  let me=localPlayerId===1?p1:p2;
  let other=localPlayerId===1?p2:p1;
  if(!me||!other)return;
  if(e.key==='j'&&me.cd1<=0&&!me.frozen&&!me.ultActive){me.cd1=me.char.skill1.cd;me.char.skill1.exec(me,other);sendNet({type:'skill',sk:'s1'});}
  if(e.key==='k'&&me.cd2<=0&&!me.frozen&&!me.ultActive){me.cd2=me.char.skill2.cd;me.char.skill2.exec(me,other);sendNet({type:'skill',sk:'s2'});}
  if(e.key==='l'&&me.ultCharge>=60&&!me.frozen&&!me.ultActive){me.ultCharge=0;me.char.ult.exec(me,other);sendNet({type:'skill',sk:'ult'});}
  if(e.key==='w')sendNet({type:'jump'});
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
});

// ===== 用户系统 + 在线联机 =====
let isOnline=false,isHost=false,ws=null,netReady=false;
let localPlayerId=1,remoteInput={};
let currentUser='',currentWins=0,opponentName='';

function connectWS(){
  let addr=location.hostname||'localhost';
  ws=new WebSocket('ws://'+addr+':9000');
  ws.onopen=()=>{
    let saved=localStorage.getItem('arena-auth');
    if(saved){let s=JSON.parse(saved);ws.send(JSON.stringify({type:'token-login',user:s.user,token:s.token}));}
  };
  ws.onmessage=handleMsg;
  ws.onerror=()=>{};
  ws.onclose=()=>{if(isOnline)netReady=false;};
}

function handleMsg(e){
  let msg=JSON.parse(e.data);
  if(msg.type==='login-ok'){
    currentUser=msg.user;currentWins=msg.wins;
    localStorage.setItem('arena-auth',JSON.stringify({user:msg.user,token:msg.token}));
    document.getElementById('user-display').textContent=msg.user;
    document.getElementById('wins-display').textContent='🏆 '+msg.wins+'胜';
    document.getElementById('user-bar').style.display='flex';
    showScreen('menu-screen');
  }
  if(msg.type==='login-fail'){
    document.getElementById('login-msg').textContent=msg.msg;
    localStorage.removeItem('arena-auth');
    showScreen('login-screen');
    document.getElementById('user-bar').style.display='none';
  }
  if(msg.type==='pw-ok'){
    document.getElementById('pw-msg').style.color='#4aeadc';
    document.getElementById('pw-msg').textContent='密码修改成功！';
    localStorage.setItem('arena-auth',JSON.stringify({user:currentUser,token:msg.token}));
    setTimeout(()=>showScreen('menu-screen'),1000);
  }
  if(msg.type==='pw-fail'){
    document.getElementById('pw-msg').style.color='#ff6ec4';
    document.getElementById('pw-msg').textContent=msg.msg;
  }
  if(msg.type==='role'){
    localPlayerId=msg.pid;isHost=msg.pid===1;
    document.getElementById('online-status').textContent='你是玩家'+msg.pid+'，'+msg.msg;
    if(msg.pid===2){isOnline=true;netReady=true;setTimeout(()=>goToSelect(),800);}
  }
  if(msg.type==='peer-joined'){
    opponentName=msg.name||'对手';
    isOnline=true;netReady=true;
    document.getElementById('online-status').textContent=opponentName+' 已加入！';
    setTimeout(()=>goToSelect(),800);
  }
  if(msg.type==='peer-info'){opponentName=msg.name||'对手';}
  if(msg.type==='peer-left'){
    netReady=false;
    if(gameState==='playing'){gameState='result';showScreen('result-screen');
      document.getElementById('result-title').textContent='对手断开连接';
      document.getElementById('result-detail').textContent='';
      document.getElementById('hud').style.display='none';}
  }
  if(msg.type==='error'){let el=document.getElementById('online-status');if(el)el.textContent=msg.msg;}
  if(msg.type==='input')remoteInput=msg.keys;
  if(msg.type==='jump'&&p1&&p2){let rp=localPlayerId===1?p2:p1;if(rp.onGround&&!rp.frozen){rp.vy=JUMP_FORCE;rp.onGround=false;}}
  if(msg.type==='skill'&&p1&&p2){
    let rp=localPlayerId===1?p2:p1,op=localPlayerId===1?p1:p2;
    if(msg.sk==='s1'&&rp.cd1<=0&&!rp.frozen&&!rp.ultActive){rp.cd1=rp.char.skill1.cd;rp.char.skill1.exec(rp,op);}
    if(msg.sk==='s2'&&rp.cd2<=0&&!rp.frozen&&!rp.ultActive){rp.cd2=rp.char.skill2.cd;rp.char.skill2.exec(rp,op);}
    if(msg.sk==='ult'&&rp.ultCharge>=60&&!rp.frozen&&!rp.ultActive){rp.ultCharge=0;rp.char.ult.exec(rp,op);}
  }
  if(msg.type==='select'){if(localPlayerId===1)sel2=msg.charIdx;else sel1=msg.charIdx;buildSelectScreen();}
  if(msg.type==='confirmed'){remoteReady=true;if(localReady)goToMapSelect();else buildSelectScreen();}
  if(msg.type==='map'){selectedMap=msg.mapIdx;buildMapScreen();}
  if(msg.type==='start'&&gameState!=='playing')startFight();
  if(msg.type==='rematch')goToSelect();
  if(msg.type==='win-update'){
    if(msg.user===currentUser){currentWins=msg.wins;document.getElementById('wins-display').textContent='🏆 '+msg.wins+'胜';}
  }
  if(msg.type==='state'&&!isHost&&p1&&p2){
    Object.assign(p1,{x:msg.p1.x,y:msg.p1.y,hp:msg.p1.hp,vx:msg.p1.vx,vy:msg.p1.vy,facing:msg.p1.f,cd1:msg.p1.c1,cd2:msg.p1.c2,ultCharge:msg.p1.uc,frozen:msg.p1.fr,shield:msg.p1.sh,armor:msg.p1.ar,invincible:msg.p1.iv});
    Object.assign(p2,{x:msg.p2.x,y:msg.p2.y,hp:msg.p2.hp,vx:msg.p2.vx,vy:msg.p2.vy,facing:msg.p2.f,cd1:msg.p2.c1,cd2:msg.p2.c2,ultCharge:msg.p2.uc,frozen:msg.p2.fr,shield:msg.p2.sh,armor:msg.p2.ar,invincible:msg.p2.iv});
    if(msg.items)items=msg.items;
  }
}

function doLogin(){
  let u=document.getElementById('login-user').value.trim();
  let p=document.getElementById('login-pass').value;
  if(!u||!p){document.getElementById('login-msg').textContent='请输入用户名和密码';return;}
  document.getElementById('login-msg').textContent='';
  if(!ws||ws.readyState!==1){connectWS();setTimeout(()=>doLogin(),500);return;}
  ws.send(JSON.stringify({type:'login',user:u,pass:p}));
}

function logout(){
  localStorage.removeItem('arena-auth');currentUser='';currentWins=0;
  document.getElementById('user-bar').style.display='none';
  showScreen('login-screen');
}

function showPwScreen(){
  document.getElementById('pw-old').value='';document.getElementById('pw-new').value='';document.getElementById('pw-new2').value='';
  document.getElementById('pw-msg').textContent='';showScreen('pw-screen');
}

function doChangePw(){
  let old=document.getElementById('pw-old').value,n1=document.getElementById('pw-new').value,n2=document.getElementById('pw-new2').value;
  if(n1!==n2){document.getElementById('pw-msg').textContent='两次密码不一致';return;}
  if(n1.length<4){document.getElementById('pw-msg').textContent='新密码至少4位';return;}
  sendNet({type:'change-pw',old:old,new:n1});
}

function goToOnline(){showScreen('online-screen');document.getElementById('online-status').textContent='';}
function leaveOnline(){isOnline=false;netReady=false;goToMenu();}
function goToMenu(){gameState='menu';showScreen('menu-screen');document.getElementById('hud').style.display='none';ctx.clearRect(0,0,W,H);}

function joinOnline(){
  document.getElementById('online-status').textContent='正在加入房间...';
  if(!ws||ws.readyState!==1){document.getElementById('online-status').textContent='未连接服务器，请刷新';return;}
  ws.send(JSON.stringify({type:'join',room:'1234'}));
}

function sendNet(msg){if(ws&&ws.readyState===1)ws.send(JSON.stringify(msg));}

let netSyncTimer=0;
function netSync(){
  if(!isOnline||!netReady)return;
  sendNet({type:'input',keys:{l:!!keysDown['a'],r:!!keysDown['d']}});

  // 只在host端应用远端玩家的移动输入
  if(isHost&&remoteInput&&p1&&p2){
    let rp=p2;
    let spd=rp.slowTimer>0?MOVE_SPEED*0.4:MOVE_SPEED;
    if(remoteInput.l){rp.vx=-spd;rp.facing=-1;}
    else if(remoteInput.r){rp.vx=spd;rp.facing=1;}
    else rp.vx*=.7;
  }

  if(isHost&&p1&&p2){
    netSyncTimer++;
    if(netSyncTimer%3===0){
      sendNet({type:'state',
        p1:{x:~~p1.x,y:~~p1.y,hp:p1.hp,vx:+(p1.vx.toFixed(1)),vy:+(p1.vy.toFixed(1)),f:p1.facing,c1:+(p1.cd1.toFixed(1)),c2:+(p1.cd2.toFixed(1)),uc:~~p1.ultCharge,fr:p1.frozen,sh:p1.shield,ar:p1.armor,iv:p1.invincible},
        p2:{x:~~p2.x,y:~~p2.y,hp:p2.hp,vx:+(p2.vx.toFixed(1)),vy:+(p2.vy.toFixed(1)),f:p2.facing,c1:+(p2.cd1.toFixed(1)),c2:+(p2.cd2.toFixed(1)),uc:~~p2.ultCharge,fr:p2.frozen,sh:p2.shield,ar:p2.armor,iv:p2.invincible},
        items:items.map(it=>({x:~~it.x,y:~~it.y,type:it.type,amount:it.amount,color:it.color,icon:it.icon,timer:it.timer,bobTimer:it.bobTimer}))
      });
    }
  }
}

connectWS();
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.addEventListener('keyup',e=>{keysDown[e.key]=false;});
window.addEventListener('blur',()=>{keysDown={};});
</script>
